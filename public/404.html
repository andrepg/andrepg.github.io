  <noscript>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.15/dist/tailwind.min.css" rel="stylesheet">
    <style>
      #main {
        opacity: 1 !important;
      }
    </style>
  </noscript>

  <script>
    const resource = location.href

    if (resource.includes('blog') || resource.includes('curriculo')) {
      sessionStorage.setItem('redirect', resource)

      const refresh = document.createElement('meta')

      refresh.content = "0;URL='/'"
      refresh.httpEquiv = 'refresh'

      document.head.appendChild(refresh)
      window.location.replace('/')
    }

    setTimeout(() => {
      document.getElementById('main').classList.toggle('opacity-100')
      document.getElementById('main').classList.toggle('opacity-0')
    }, 500)
  </script>

  <style>
    * {
      transition: all 0.6s;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Cabin', sans-serif;
      color: #888;
      margin: 0;
    }

    .fof {
      display: table-cell;
      vertical-align: middle;
    }

    .fof h1 {
      font-size: 50px;
      display: inline-block;
      padding-right: 12px;
      animation: type .5s alternate infinite;
    }

    @keyframes type {
      from {
        box-shadow: inset -3px 0 0 #888;
      }

      to {
        box-shadow: inset -3px 0 0 transparent;
      }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: rgb(17 24 39)
      }
    }
  </style>

<body class="flex flex-col min-h-screen dark:bg-gray-900 dark:text-gray-200">
  <noscript>

      <p>Para uma melhor experiência e para que os redirecionamentos automáticos funcionem, por favor, ative o JavaScript.</p>
    </div>
  </noscript>

  <div class="flex flex-col h-full justify-between min-h-screen">
    <div id="main" class="opacity-0 w-full flex-1 flex flex-col items-center justify-center">
      <div class="fof">
        <h1>Error 404</h1>
        <p>Parece que essa página foi perdida.</p>
        <nav class="flex flex-wrap gap-4 justify-center mt-8">
          <a href="/" class="text-purple-300 hover:text-purple-100 underline underline-offset-4 transition-colors">Início</a>
          <a href="/curriculo" class="text-purple-300 hover:text-purple-100 underline underline-offset-4 transition-colors">Currículo</a>
          <a href="/projetos" class="text-purple-300 hover:text-purple-100 underline underline-offset-4 transition-colors">Projetos</a>
          <a href="/blog" class="text-purple-300 hover:text-purple-100 underline underline-offset-4 transition-colors">Blog</a>
        </nav>
      </div>
    </div>

    <footer
      class="flex flex-col text-xs py-5 px-3 text-white w-full justify-center bg-purple-900 shadow-inner z-10 mt-4">
      <span>Made with 🤍 and VueJS</span>
      <span>Hosted by 🤖 GitHub Pages</span>
    </footer>
  </div>
</body>
